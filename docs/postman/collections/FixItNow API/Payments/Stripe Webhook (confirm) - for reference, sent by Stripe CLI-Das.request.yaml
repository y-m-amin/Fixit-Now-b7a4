$kind: http-request
name: Stripe Webhook (confirm) - for reference, sent by Stripe CLI/Dashboard
url: "{{baseUrl}}/api/payments/confirm"
method: POST
headers:
  Content-Type: application/json
  Stripe-Signature: t=...,v1=... (generated by Stripe, do not set manually)
body:
  type: text
  content: // This endpoint is called by Stripe (CLI `stripe listen` or the Dashboard), not manually from Postman, since it requires a valid Stripe signature.
order: 5000
