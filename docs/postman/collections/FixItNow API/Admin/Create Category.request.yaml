$kind: http-request
url: "{{baseUrl}}/api/admin/categories"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{adminToken}}
body:
  type: text
  content: |-
    {
      "name": "Electrical",
      "description": "Wiring, fixtures, electrical repairs"
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json().data;
      if (data && data.id) { pm.environment.set('categoryId', data.id); }
    language: text/javascript
order: 5000
