$kind: http-request
url: "{{baseUrl}}/api/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Jane Customer",
      "email": "jane.customer@example.com",
      "password": "secret123",
      "role": "CUSTOMER"
    }
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json().data;
      if (data && data.token) { pm.environment.set('token', data.token); }
    language: text/javascript
order: 1000
