$kind: http-request
url: "{{baseUrl}}/api/services?page=1&limit=20"
method: GET
queryParams:
  - key: page
    value: "1"
  - key: limit
    value: "20"
  - key: category
    value: Plumbing
    disabled: true
  - key: maxPrice
    value: "100"
    disabled: true
scripts:
  - type: afterResponse
    code: |-
      const data = pm.response.json().data;
      if (data && data.services && data.services.length) { pm.environment.set('serviceId', data.services[0].id); }
    language: text/javascript
order: 1000
