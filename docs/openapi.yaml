openapi: 3.0.3
info:
  title: FixItNow API
  description: |
    Backend API for FixItNow, a home services marketplace connecting customers
    with technicians. Every response follows a consistent envelope:

    Success: `{ "success": true, "message": string, "data": T }`

    Error: `{ "success": false, "message": string, "errorDetails": T | null }`
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development

tags:
  - name: Auth
  - name: Categories
  - name: Technicians (public)
  - name: Technician (self-management)
  - name: Services
  - name: Bookings
  - name: Payments
  - name: Reviews
  - name: Admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data: {}
    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        errorDetails:
          nullable: true

    Role:
      type: string
      enum: [CUSTOMER, TECHNICIAN, ADMIN]
    UserStatus:
      type: string
      enum: [ACTIVE, BANNED]
    BookingStatus:
      type: string
      enum: [REQUESTED, ACCEPTED, DECLINED, PAID, IN_PROGRESS, COMPLETED, CANCELLED]
    PriceType:
      type: string
      enum: [FIXED, HOURLY]
    PaymentMethod:
      type: string
      enum: [STRIPE, SSLCOMMERZ]
    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED]

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        role: { $ref: '#/components/schemas/Role' }
        status: { $ref: '#/components/schemas/UserStatus' }
        createdAt: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: Jane Doe }
        email: { type: string, format: email, example: jane@example.com }
        password: { type: string, format: password, minLength: 6, example: secret123 }
        phone: { type: string, example: '+1234567890' }
        role: { type: string, enum: [CUSTOMER, TECHNICIAN], default: CUSTOMER }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    AuthResponseData:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        token: { type: string }

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Plumbing }
        description: { type: string }
        icon: { type: string }

    TechnicianProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        bio: { type: string, nullable: true }
        experienceYears: { type: integer }
        hourlyRate: { type: number, nullable: true }
        skills: { type: array, items: { type: string } }
        location: { type: string, nullable: true }
        avgRating: { type: number }
        totalReviews: { type: integer }

    UpdateTechnicianProfileRequest:
      type: object
      properties:
        bio: { type: string }
        experienceYears: { type: integer, minimum: 0, maximum: 60 }
        hourlyRate: { type: number, minimum: 0 }
        skills: { type: array, items: { type: string } }
        location: { type: string }

    AvailabilitySlotInput:
      type: object
      required: [dayOfWeek, startTime, endTime]
      properties:
        dayOfWeek: { type: integer, minimum: 0, maximum: 6, description: '0 = Sunday ... 6 = Saturday' }
        startTime: { type: string, example: '09:00' }
        endTime: { type: string, example: '17:00' }

    UpdateAvailabilityRequest:
      type: object
      required: [slots]
      properties:
        slots:
          type: array
          items: { $ref: '#/components/schemas/AvailabilitySlotInput' }

    Service:
      type: object
      properties:
        id: { type: string, format: uuid }
        technicianProfileId: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        price: { type: number }
        priceType: { $ref: '#/components/schemas/PriceType' }

    CreateServiceRequest:
      type: object
      required: [categoryId, title, price]
      properties:
        categoryId: { type: string, format: uuid }
        title: { type: string, example: 'Kitchen sink leak repair' }
        description: { type: string }
        price: { type: number, example: 45 }
        priceType: { $ref: '#/components/schemas/PriceType' }

    UpdateServiceRequest:
      type: object
      properties:
        categoryId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        price: { type: number }
        priceType: { $ref: '#/components/schemas/PriceType' }

    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        technicianProfileId: { type: string, format: uuid }
        serviceId: { type: string, format: uuid }
        scheduledAt: { type: string, format: date-time }
        address: { type: string }
        notes: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/BookingStatus' }

    CreateBookingRequest:
      type: object
      required: [serviceId, scheduledAt, address]
      properties:
        serviceId: { type: string, format: uuid }
        scheduledAt: { type: string, format: date-time }
        address: { type: string, example: '221B Baker Street' }
        notes: { type: string }

    UpdateBookingStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, DECLINED, IN_PROGRESS, COMPLETED]

    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        transactionId: { type: string }
        amount: { type: number }
        method: { $ref: '#/components/schemas/PaymentMethod' }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        paidAt: { type: string, format: date-time, nullable: true }

    CreatePaymentRequest:
      type: object
      required: [bookingId]
      properties:
        bookingId: { type: string, format: uuid }
        method: { $ref: '#/components/schemas/PaymentMethod' }

    CreatePaymentResponseData:
      type: object
      properties:
        payment: { $ref: '#/components/schemas/Payment' }
        clientSecret: { type: string, description: 'Stripe PaymentIntent client secret, used by the frontend to confirm the card payment' }

    Review:
      type: object
      properties:
        id: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        customerId: { type: string, format: uuid }
        technicianProfileId: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }

    CreateReviewRequest:
      type: object
      required: [bookingId, rating]
      properties:
        bookingId: { type: string, format: uuid }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }

    UpdateUserStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/UserStatus' }

  responses:
    BadRequest:
      description: Validation or business-rule error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but not permitted to perform this action
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (customer or technician)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/BadRequest' }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and receive a JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/categories:
    get:
      tags: [Categories]
      summary: List all service categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /api/technicians:
    get:
      tags: [Technicians (public)]
      summary: List technicians with filters
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: minRating
          schema: { type: number }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated technicians
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /api/technicians/{id}:
    get:
      tags: [Technicians (public)]
      summary: Get a technician's profile with services and reviews
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Technician profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/technician/profile:
    put:
      tags: [Technician (self-management)]
      summary: Update your own technician profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTechnicianProfileRequest' }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/technician/availability:
    put:
      tags: [Technician (self-management)]
      summary: Replace your weekly availability slots
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAvailabilityRequest' }
      responses:
        '200':
          description: Updated availability slots
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/services:
    get:
      tags: [Services]
      summary: List services with filters
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: location
          schema: { type: string }
        - in: query
          name: minRating
          schema: { type: number }
        - in: query
          name: maxPrice
          schema: { type: number }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated services
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }

  /api/technician/services:
    post:
      tags: [Technician (self-management)]
      summary: Create a service listing
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateServiceRequest' }
      responses:
        '201':
          description: Created service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/technician/services/{id}:
    put:
      tags: [Technician (self-management)]
      summary: Update your own service listing
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateServiceRequest' }
      responses:
        '200':
          description: Updated service
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Technician (self-management)]
      summary: Delete your own service listing
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/bookings:
    post:
      tags: [Bookings]
      summary: Create a booking (role: CUSTOMER)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookingRequest' }
      responses:
        '201':
          description: Created booking
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      tags: [Bookings]
      summary: List your own bookings (customer or technician)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/BookingStatus' }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated bookings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking detail (owner or admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Booking detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/bookings/{id}/cancel:
    patch:
      tags: [Bookings]
      summary: Cancel a booking (role: CUSTOMER, only before IN_PROGRESS)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Cancelled booking
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/technician/bookings:
    get:
      tags: [Technician (self-management)]
      summary: List incoming bookings for the current technician
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/BookingStatus' }
      responses:
        '200':
          description: Paginated bookings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/technician/bookings/{id}:
    patch:
      tags: [Technician (self-management)]
      summary: Accept, decline, start, or complete a booking
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateBookingStatusRequest' }
      responses:
        '200':
          description: Updated booking
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/payments/create:
    post:
      tags: [Payments]
      summary: Create a Stripe PaymentIntent for an ACCEPTED booking (role: CUSTOMER)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentRequest' }
      responses:
        '201':
          description: Created payment intent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CreatePaymentResponseData' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/payments/confirm:
    post:
      tags: [Payments]
      summary: Stripe webhook — verifies signature, marks payment COMPLETED and booking PAID
      description: |
        Called by Stripe, not by API clients directly. Requires the raw request
        body and the `Stripe-Signature` header for signature verification.
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/payments:
    get:
      tags: [Payments]
      summary: Your own payment history
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Paginated payments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/payments/{id}:
    get:
      tags: [Payments]
      summary: Payment detail (owner or admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/reviews:
    post:
      tags: [Reviews]
      summary: Review a COMPLETED booking (role: CUSTOMER)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReviewRequest' }
      responses:
        '201':
          description: Created review
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/BadRequest' }

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users (role: ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: role
          schema: { $ref: '#/components/schemas/Role' }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/UserStatus' }
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/admin/users/{id}:
    patch:
      tags: [Admin]
      summary: Ban or unban a user (role: ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserStatusRequest' }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/admin/bookings:
    get:
      tags: [Admin]
      summary: List all bookings (role: ADMIN)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/BookingStatus' }
      responses:
        '200':
          description: Paginated bookings
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/admin/categories:
    get:
      tags: [Admin]
      summary: List all categories (role: ADMIN)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    post:
      tags: [Admin]
      summary: Create a new category (role: ADMIN)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: Created category
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessEnvelope' }
        '409': { $ref: '#/components/responses/BadRequest' }
